server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:sqlite:${DB_PATH:./users.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true

jwt:
  secret: 4567890123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890
  expiration: 86400000 # 1 day
