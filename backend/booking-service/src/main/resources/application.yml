server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:sqlite:${DB_PATH:./bookings.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
