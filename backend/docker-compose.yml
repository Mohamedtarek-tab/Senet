name: senet

services:

  # ── Service Registry (starts first) ─────────────────────────────
  eureka-server:
    build:
      context: .
      dockerfile: eureka-server/Dockerfile
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider",
             "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── API Gateway ──────────────────────────────────────────────────
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8081
      - CAR_SERVICE_URL=http://car-service:8082
      - BOOKING_SERVICE_URL=http://booking-service:8083
    depends_on:
      eureka-server:
        condition: service_healthy
      auth-service:
        condition: service_started
      car-service:
        condition: service_started
      booking-service:
        condition: service_started

  # ── Auth Service ─────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - DB_PATH=/data/users.db
    volumes:
      - ./data:/data
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── Car Service ──────────────────────────────────────────────────
  car-service:
    build:
      context: .
      dockerfile: car-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - DB_PATH=/data/cars.db
    volumes:
      - ./data:/data
    depends_on:
      eureka-server:
        condition: service_healthy

  # ── Booking Service ──────────────────────────────────────────────
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - DB_PATH=/data/bookings.db
      - CAR_SERVICE_URL=http://car-service:8082
    volumes:
      - ./data:/data
    depends_on:
      eureka-server:
        condition: service_healthy
