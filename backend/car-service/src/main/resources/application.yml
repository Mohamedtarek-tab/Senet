server:
  port: 8082

spring:
  application:
    name: car-service
  datasource:
    url: jdbc:sqlite:${DB_PATH:./cars.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false   # suppresses the open-in-view warning

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true
