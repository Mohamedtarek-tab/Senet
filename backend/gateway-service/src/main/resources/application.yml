server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: auth-service
          uri: lb://auth-service          # ← was: http://auth-service:8081
          predicates:
            - Path=/api/auth/**, /api/users/**
        - id: car-service
          uri: lb://car-service           # ← was: http://car-service:8082
          predicates:
            - Path=/api/cars/**
        - id: booking-service
          uri: lb://booking-service       # ← was: http://booking-service:8083
          predicates:
            - Path=/api/bookings/**, /api/payments/**

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: 4567890123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890123456789012345678901234567890
